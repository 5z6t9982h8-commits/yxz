<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b1522">
<title>燕行舟偵探事務所</title>
<style>
:root{
  --ink:#0b1522;          /* 夜幕深藍 */
  --panel:#111e30;        /* 檔案櫃藍 */
  --panel2:#16263c;       /* 浮起卡片 */
  --line:#24384f;         /* 鋼筆線 */
  --fog:#c9d7e6;          /* 霧藍主文字 */
  --dim:#7f93a8;          /* 次要文字 */
  --rain:#5aa7d6;         /* 雨窗藍（主色） */
  --ember:#e0a458;        /* 菸頭琥珀（點綴） */
  --danger:#d67070;
  --ok:#7fc9a6;
  --radius:14px;
  font-size:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--ink);
  color:var(--fog);
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
}
/* 雨絲背景 */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    repeating-linear-gradient(115deg, transparent 0 46px, rgba(90,167,214,.05) 46px 47px),
    radial-gradient(1200px 600px at 70% -10%, rgba(90,167,214,.10), transparent 60%);
}
#app{position:relative;z-index:1;max-width:860px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

h1,h2,h3,.serif{font-family:"Noto Serif TC","Songti TC",serif;letter-spacing:.06em}
button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;transition:.15s}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--rain);outline-offset:2px}
input,textarea,select{
  width:100%;background:#0d1929;border:1px solid var(--line);color:var(--fog);
  border-radius:10px;padding:.6em .8em;font-family:inherit;font-size:.95rem;
}
textarea{resize:vertical;min-height:2.8em}
::placeholder{color:#54687f}
.btn{background:var(--panel2);color:var(--fog);border:1px solid var(--line);padding:.55em 1.1em;font-size:.92rem}
.btn:hover{border-color:var(--rain);color:#fff}
.btn-primary{background:linear-gradient(135deg,#2c5c85,#1c3c5c);border:1px solid #3f76a5;color:#eaf4fb;font-weight:600}
.btn-primary:hover{filter:brightness(1.15)}
.btn-ghost{background:transparent;border:1px dashed var(--line);color:var(--dim)}
.btn-ghost:hover{color:var(--fog);border-color:var(--dim)}
.btn-sm{padding:.3em .7em;font-size:.8rem}
.hidden{display:none!important}

/* ============ 封面 ============ */
#cover{padding:2.2rem 1.2rem 1rem;text-align:center}
#coverArt{width:min(430px,92%);margin:0 auto;display:block;border-radius:18px;
  box-shadow:0 18px 60px rgba(0,0,0,.55), inset 0 0 0 1px rgba(90,167,214,.25)}
#cover h1{font-size:2rem;margin:1.1rem 0 .1rem;color:#e8f1fa}
#cover .sub{color:var(--dim);font-size:.9rem;letter-spacing:.35em;text-indent:.35em}
.smoke{animation:smoke 6s ease-in-out infinite alternate;transform-origin:bottom}
@keyframes smoke{from{transform:translateY(0) skewX(0deg);opacity:.8}to{transform:translateY(-8px) skewX(-6deg);opacity:.35}}
@media (prefers-reduced-motion:reduce){.smoke{animation:none}}

/* ============ 設定面板 ============ */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:1.15rem 1.2rem;margin:1rem 1.2rem}
.card h2{font-size:1.02rem;color:var(--rain);margin-bottom:.8rem;display:flex;align-items:center;gap:.5em}
.card h2::before{content:"";width:8px;height:8px;background:var(--rain);transform:rotate(45deg);display:inline-block}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.82rem;color:var(--dim);margin-bottom:.3em;letter-spacing:.08em}
.row{display:flex;gap:.7rem;flex-wrap:wrap}
.row>.field{flex:1;min-width:140px}
.hint{font-size:.76rem;color:#5a7288;margin-top:.3em}
.savebar{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.4rem}
#startBtn{width:calc(100% - 2.4rem);margin:0 1.2rem 2.2rem;padding:.9em;font-size:1.05rem;letter-spacing:.2em}

/* ============ 遊戲頁 ============ */
#game{display:flex;flex-direction:column;height:100dvh}
#hud{
  position:sticky;top:0;z-index:20;background:rgba(11,21,34,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:.55rem .9rem .5rem;
}
#hudTop{display:flex;align-items:center;gap:.6rem}
#hudAvatar{width:38px;height:38px;border-radius:10px;flex-shrink:0;border:1px solid var(--line)}
#hudName{font-weight:700;font-size:.95rem;color:#e8f1fa;font-family:"Noto Serif TC",serif}
#hudGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.25rem .8rem;margin-top:.4rem;font-size:.78rem}
.stat{display:flex;align-items:baseline;gap:.4em;min-width:0}
.stat .k{color:#5a7288;flex-shrink:0}
.stat .v{color:var(--fog);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat .v.money{color:var(--ember)}
.stat .v.aff{color:#e491b0}
.stat .v.case{color:var(--rain)}
.flash{animation:flash .8s}
@keyframes flash{0%{color:#fff;text-shadow:0 0 8px var(--rain)}100%{}}

#log{flex:1;overflow-y:auto;padding:1rem .9rem 6.5rem;scroll-behavior:smooth}
.msg{display:flex;gap:.6rem;margin-bottom:1.1rem;max-width:100%}
.msg .ava{width:34px;height:34px;border-radius:9px;flex-shrink:0;border:1px solid var(--line)}
.bubble{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:.7rem .9rem;font-size:.93rem;
  max-width:calc(100% - 44px);white-space:pre-wrap;word-break:break-word}
.msg.user{flex-direction:row-reverse}
.msg.user .bubble{background:#1a2d44;border-color:#2c4763}
.msg.user .ava{display:none}
.msg .editBtn{align-self:flex-end;background:none;border:none;color:#4b657d;font-size:.75rem;padding:.2em .4em}
.msg .editBtn:hover{color:var(--rain)}
.sys{font-size:.78rem;color:#5a7288;text-align:center;margin:.8rem 0;letter-spacing:.1em}
.sys.err{color:var(--danger)}
.caret{display:inline-block;width:.5em;background:var(--rain);animation:blink 1s steps(1) infinite;height:1em;vertical-align:-2px}
@keyframes blink{50%{opacity:0}}

/* 角色檔案卡（人物檔案風） */
.ccard{position:relative;display:flex;gap:1rem;align-items:flex-start;overflow:hidden;
  background:linear-gradient(150deg,#1a2e47 0%,#122238 55%,#0e1a2b 100%);
  border:1px solid #35547a;border-radius:14px;padding:1rem 1.05rem 1.15rem;margin:.7rem 0 1.3rem;
  box-shadow:0 10px 28px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05)}
.ccard::before{content:"PERSON FILE";position:absolute;right:.95rem;bottom:.5rem;font-size:.6rem;
  letter-spacing:.35em;color:rgba(122,160,198,.35);font-family:serif;pointer-events:none}
.ccard::after{content:"";position:absolute;inset:6px;border:1px dashed rgba(90,167,214,.22);border-radius:10px;pointer-events:none}
.ccard .pic{width:88px;height:88px;border-radius:10px;flex-shrink:0;object-fit:cover;
  border:1px solid #3d6a97;outline:3px solid rgba(90,167,214,.15);outline-offset:2px}
.ccard .info{font-size:.83rem;min-width:0;position:relative;z-index:1}
.ccard .chead{display:flex;align-items:center;gap:.55em;flex-wrap:wrap;margin-bottom:.35rem}
.ccard .chead b{font-size:1.1rem;color:#eef5fb;font-family:"Noto Serif TC",serif;letter-spacing:.14em}
.ccard .tag{font-size:.7rem;color:#9cc4e4;border:1px solid #3d6a97;border-radius:99px;padding:.05em .75em;background:rgba(90,167,214,.08)}
.ccard .crow{display:flex;gap:.6em;margin-top:.28rem;line-height:1.65}
.ccard .ck{flex-shrink:0;color:#5f7f9d;font-size:.72rem;border-left:2px solid var(--rain);padding-left:.5em;margin-top:.2em}
.ccard .cv{color:#c3d3e3}
/* 小說式敘事段 */
.novel{position:relative;padding:.15rem .1rem 1.4rem;font-size:.95rem;line-height:2;color:#d7e2ee;white-space:pre-wrap;word-break:break-word}
/* 案件視窗分組與類型鍵 */
.caseGroup{font-size:.72rem;color:#5a7288;letter-spacing:.25em;margin:.75rem 0 .5rem;display:flex;align-items:center;gap:.6em}
.caseGroup:first-child{margin-top:0}
.caseGroup::after{content:"";flex:1;height:1px;background:var(--line)}
#genreWrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:.45rem;margin-bottom:.55rem}
.genreBtn{background:var(--panel2);border:1px solid var(--line);color:var(--fog);border-radius:9px;padding:.5em .2em;font-size:.83rem}
.genreBtn:hover{border-color:var(--rain);color:#fff}

/* 底部操作區 */
#dock{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(11,21,34,.94);backdrop-filter:blur(8px);
  border-top:1px solid var(--line)}
#dockIn{max-width:860px;margin:0 auto;padding:.55rem .9rem calc(.7rem + env(safe-area-inset-bottom))}
#toolRow{display:flex;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap}
#inputRow{display:flex;gap:.5rem;align-items:flex-end}
#actionInput{flex:1;min-height:2.6em;max-height:7em}
#sendBtn{padding:.6em 1.3em}
#editHint{font-size:.75rem;color:var(--ember);margin-bottom:.35rem;display:flex;justify-content:space-between}
.busy #sendBtn{opacity:.5;pointer-events:none}

/* 案件視窗 */
#modalBg{position:fixed;inset:0;background:rgba(4,9,15,.7);z-index:40;display:flex;align-items:center;justify-content:center;padding:1rem}
#modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:420px;width:100%;padding:1.3rem}
#modal h3{color:var(--rain);margin-bottom:.9rem;font-size:1.05rem}
.caseBtn{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
  color:var(--fog);padding:.7em .9em;border-radius:10px;margin-bottom:.55rem;font-size:.9rem}
.caseBtn:hover{border-color:var(--rain)}
.caseBtn small{display:block;color:#5a7288;font-size:.75rem;margin-top:.1em}
.caseBtn.horror small{color:#a56a6a}
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:60;background:#1a2d44;border:1px solid var(--rain);
  color:#eaf4fb;padding:.5em 1.2em;border-radius:99px;font-size:.85rem;opacity:0;pointer-events:none;transition:.3s}
#toast.show{opacity:1}
@media (max-width:520px){
  #hudGrid{grid-template-columns:repeat(2,1fr)}
  .ccard{margin-left:0;max-width:100%}
}
</style>
</head>

/* ---------- 頭像繪製（Q版縮圖，Canvas 生成） ---------- */
function drawChibi(ctx, s){ // App 圖示：深色圓角方塊＋白色「燕」字
  ctx.clearRect(0,0,s,s);
  const bg=ctx.createLinearGradient(0,0,0,s);
  bg.addColorStop(0,"#2b303b"); bg.addColorStop(.5,"#14171e"); bg.addColorStop(1,"#0a0c11");
  ctx.fillStyle=bg; roundRect(ctx,0,0,s,s,s*.235); ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,.09)"; ctx.lineWidth=Math.max(1,s*.012);
  roundRect(ctx,s*.022,s*.022,s*.956,s*.956,s*.215); ctx.stroke();
  ctx.fillStyle="#f5f7fa";
  ctx.font=`900 ${Math.round(s*.62)}px "Noto Serif TC","PingFang TC","Microsoft JhengHei",serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("燕", s/2, s*.545);
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function chibiDataURL(size){
  const c = document.createElement("canvas"); c.width=c.height=size;
  drawChibi(c.getContext("2d"), size);
  return c.toDataURL("image/png");
}

/* NPC 肖像：依名字雜湊生成插畫風肖像（單機檔案無法即時生成 AI 照片，以手繪風向量肖像呈現） */

  x.fillStyle=bg; roundRect(x,0,0,S,S,18); x.fill();

  x.fillStyle="rgba(0,0,0,.12)"; x.beginPath();
  x.moveTo(96,128); x.lineTo(96,140); x.quadraticCurveTo(110,148,124,140); x.lineTo(124,128); x.closePath(); x.fill();

  if(style===2){ // 後梳

    x.bezierCurveTo(138,24,164,42,158,92);
    x.bezierCurveTo(156,66,146,52,132,48);

    x.moveTo(62,92); x.bezierCurveTo(58,38,86,22,110,22);

/* 打字機：以時間戳計算進度，分頁切到背景也會持續前進、回頁即補齊 */
function typewriter(bubble, text){
  return new Promise(res=>{
    const el=bubble.querySelector(".txt"), caret=bubble.querySelector(".caret");
    const CPS=42, start=performance.now(); let done=false;
    function finish(){ if(done)return; done=true; clearInterval(t); el.textContent=text; if(caret)caret.remove(); res(); }
    bubble.onclick=finish; // 點擊跳過
    const t=setInterval(()=>{
      if(document.hidden){ finish(); return; }           // 背景直接完成，避免漏字
      const n=Math.min(text.length, Math.floor((performance.now()-start)/1000*CPS));
      el.textContent=text.slice(0,n);
      if(n>=text.length) finish();
    }, 28);
  });
}

/* ---------- API 呼叫 ---------- */
async function callLLM(messages){
  const sys=systemPrompt(), key=state.apiKey, model=state.model, P=state.provider;
  let url, opt;
  if(P==="claude"){
    url="https://api.anthropic.com/v1/messages";
    opt={method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model, max_tokens:3000, system:sys, messages})};
    const r=await fetch(url,opt); const d=await r.json();
    if(!r.ok) throw new Error(d.error?.message||("HTTP "+r.status));
    return (d.content||[]).map(b=>b.text||"").join("");
  }
  if(P==="gemini"){
    url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
    opt={method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system_instruction:{parts:[{text:sys}]},
        contents:messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),
        generationConfig:{maxOutputTokens:3000}})};
    const r=await fetch(url,opt); const d=await r.json();
    if(!r.ok) throw new Error(d.error?.message||("HTTP "+r.status));
    return d.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"";
  }
  // OpenAI 相容（gpt / grok）
  url = P==="grok" ? "https://api.x.ai/v1/chat/completions" : "https://api.openai.com/v1/chat/completions";
  opt={method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
    body:JSON.stringify({model, max_tokens:3000, messages:[{role:"system",content:sys},...messages]})};
  const r=await fetch(url,opt); const d=await r.json();
  if(!r.ok) throw new Error(d.error?.message||("HTTP "+r.status));
  return d.choices?.[0]?.message?.content||"";
}

function parseReply(raw){
  let s=(raw||"").trim().replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();
  const a=s.indexOf("{"), b=s.lastIndexOf("}");
  if(a>=0&&b>a) s=s.slice(a,b+1);
  try{ const j=JSON.parse(s); if(typeof j.story==="string") return j; }catch(e){}
  // 解析失敗：整段當作故事
  return {story:raw, time:state.stats.time, location:state.stats.location, status:state.stats.status,
          mood:state.stats.mood, affection_change:0, money_change:0, new_characters:[]};
}

/* ---------- 回合流程 ---------- */
async function runTurn(userText, {replaceLast=false, silentUser=false, hideUser=false}={}){
  if(state.busy) return; state.busy=true; document.body.classList.add("busy");
  try{
    if(replaceLast){
      // 移除最後一組 user+assistant
      while(state.history.length && state.history[state.history.length-1].role==="assistant") state.history.pop();
      if(state.history.length && state.history[state.history.length-1].role==="user") state.history.pop();
      // 移除畫面上最後一則 AI 訊息與其後的角色卡、以及最後一則使用者泡泡（若編輯）
      removeAfterLastUser(state.editIndex>=0);
    }
    const hidden = silentUser || hideUser;
    state.history.push({role:"user",content:userText});
    state.lastUserHidden = !!hidden;
    if(!hidden && !replaceLast){ state.transcript.push({type:"user",text:userText}); addUserBubble(userText); }
    if(!hidden && replaceLast && state.editIndex>=0){ state.transcript.push({type:"user",text:userText}); addUserBubble(userText); }

    const thinking=document.createElement("div"); thinking.className="sys"; thinking.textContent="燕行舟正在思考⋯⋯"; log().appendChild(thinking); scrollBottom();
    let raw;
    try{ raw=await callLLM(state.history); }
    finally{ thinking.remove(); }

    const j=parseReply(raw);
    // 先更新數值與角色卡（角色卡優先於文字劇情呈現）
    const s=state.stats;
    s.time=j.time||s.time; s.location=j.location||s.location; s.status=j.status||s.status; s.mood=j.mood||s.mood;
    s.affection += (parseInt(j.affection_change)||0);
    s.money += (parseInt(j.money_change)||0);
    updateHUD(true);
    (j.new_characters||[]).forEach(c=>{
      if(!c||!c.name||state.characters[c.name]) return;
      state.characters[c.name]=c;
      state.transcript.push({type:"card",card:c});
      addCharCard(c);
    });

    state.history.push({role:"assistant",content:raw});
    state.transcript.push({type:"ai",text:j.story});
    const bubble=addAiBubble();
    await typewriter(bubble, j.story);
    autosave();
  }catch(err){
    sysLine("⚠ 生成失敗："+err.message+"（可按「重新生成」再試）", true);
  }finally{
    state.busy=false; document.body.classList.remove("busy");
    state.editIndex=-1; $("editHint").classList.add("hidden");
  }
}

function removeAfterLastUser(alsoUser){
  // transcript：只從尾端移除 ai / card（sys 與 user 保留）
  while(state.transcript.length){
    const t=state.transcript[state.transcript.length-1].type;
    if(t==="ai"||t==="card") state.transcript.pop(); else break;
  }
  if(alsoUser && state.transcript.length && state.transcript[state.transcript.length-1].type==="user") state.transcript.pop();
  // DOM：從尾端移除敘事段與角色卡
  const kids=log().children;
  for(let i=kids.length-1;i>=0;i--){
    const el=kids[i];
    if(el.classList.contains("novel")||el.classList.contains("ccard")||(el.classList.contains("sys")&&el.classList.contains("err"))) el.remove();
    else break;
  }
  if(alsoUser){
    const users=[...log().querySelectorAll(".msg.user")];
    if(users.length) users[users.length-1].remove();
  }
  refreshEditButtons();
}

};

  }else if(genre){
    sysRecord(`── 開啟案件副本：${genre} ──`);
    order=`〔開啟案件〕系統指令：原創生成一件「${genre}」類型的案件並命名，以委託上門、來電或事件突發開場，難度比照現實，線索需玩家主動調查才逐步揭露，破案需兇手動機與具體證據齊備${genre==="靈異懸疑"?"；此案為恐怖向，加強陰森懸疑氛圍（點到為止、不血腥獵奇）":""}。將 status 設為案件名稱。`;
  }else{
    sysRecord("── 開啟案件副本：隨機委託 ──");
    order="〔開啟案件〕系統指令：隨機生成一件全新原創委託案件並命名（不得為桃色交易、五個影子、消失的兇器），以委託人上門或來電開場，難度比照現實，可帶懸疑氛圍。將 status 設為案件名稱。";
  }
  runTurn(order,{hideUser:true});
}

document.querySelectorAll(".caseBtn[data-script]").forEach(b=>{
  b.onclick=()=>{ $("modalBg").classList.add("hidden"); startCase(b.dataset.script); };
});
document.querySelector('.caseBtn[data-case="__random__"]').onclick=()=>{
  $("modalBg").classList.add("hidden"); startCase(null,null);
};
$("customCaseBtn").onclick=()=>{
  const v=$("customCase").value.trim(); if(!v){ toast("請先輸入案件主題"); return; }
  $("modalBg").classList.add("hidden"); $("customCase").value="";
  sysRecord(`── 開啟案件副本：${v} ──`);
  runTurn(`〔開啟案件〕系統指令：以「${v}」為主題生成新案件並命名，難度比照現實，將 status 設為案件名稱。`,{hideUser:true});
};
$("leaveCaseBtn").onclick=()=>{
  $("modalBg").classList.add("hidden");
  sysRecord("── 離開案件副本，回到日常 ──");
  runTurn("〔離開副本〕系統指令：玩家選擇暫時離開目前案件，將 status 切回「日常」，自然收尾並回到事務所日常劇情，案件可日後再續。",{hideUser:true});
};

/* ---------- 存檔 ---------- */
function autosave(){ saveGame(false); }
function saveGame(manual){
  const ok=store.set(LS.save,{
    when:Date.now(), provider:state.provider, model:state.model,
    persona:state.persona, stats:state.stats, history:state.history,
    transcript:state.transcript, characters:state.characters,
    lastUserHidden:state.lastUserHidden
  });
  if(manual) toast(ok?"已存檔 ✓":"存檔失敗：此環境不支援本機儲存");
}
$("saveNowBtn").onclick=()=>saveGame(true);

function rebuildFromTranscript(){
  log().innerHTML="";
  for(const t of state.transcript){
    if(t.type==="user") addUserBubble(t.text);
    else if(t.type==="card") addCharCard(t.card);
    else if(t.type==="ai"){ const b=addAiBubble(); b.querySelector(".txt").textContent=t.text; b.querySelector(".caret")?.remove(); }
    else if(t.type==="sys") sysLine(t.text);
  }
  refreshEditButtons(); scrollBottom();
}

/* ---------- 設定頁邏輯 ---------- */
$("provider").onchange=e=>populateModels(e.target.value);
$("saveApiBtn").onclick=()=>{
  const ok=store.set(LS.api,{provider:$("provider").value,model:$("modelName").value.trim(),key:$("apiKey").value.trim()});
  toast(ok?"已記住 API（僅存於本機）":"此環境不支援本機儲存");
};
$("clearApiBtn").onclick=()=>{ store.del(LS.api); $("apiKey").value=""; toast("已清除"); };
$("savePersonaBtn").onclick=()=>{
  const ok=store.set(LS.persona,{name:$("pName").value,age:$("pAge").value,personality:$("pPersona").value,other:$("pOther").value});
  toast(ok?"已記住人設":"此環境不支援本機儲存");
};
$("clearPersonaBtn").onclick=()=>{ store.del(LS.persona); ["pName","pAge","pPersona","pOther"].forEach(i=>$(i).value=""); toast("已清除"); };

function loadPrefs(){
  const a=store.get(LS.api);
  if(a){ $("provider").value=a.provider||"claude"; populateModels($("provider").value, a.model||null); $("apiKey").value=a.key||""; }
  else populateModels($("provider").value);
  const p=store.get(LS.persona);
  if(p){ $("pName").value=p.name||""; $("pAge").value=p.age||""; $("pPersona").value=p.personality||""; $("pOther").value=p.other||""; }
  const s=store.get(LS.save);
  if(s && s.history?.length){
    $("resumeCard").style.display="";
    const d=new Date(s.when);
    $("resumeInfo").textContent=`上次遊玩：${d.toLocaleString()}｜狀態：${s.stats?.status||"日常"}｜好感 ${s.stats?.affection}｜資金 ${fmtMoney(s.stats?.money||0)}`;
  }
}
$("deleteSaveBtn").onclick=()=>{ store.del(LS.save); $("resumeCard").style.display="none"; toast("存檔已刪除"); };

function collectSetup(){
  state.provider=$("provider").value; state.model=$("modelName").value.trim()||DEFAULT_MODELS[state.provider];
  state.apiKey=$("apiKey").value.trim();
  state.persona={name:$("pName").value.trim(),age:$("pAge").value.trim(),personality:$("pPersona").value.trim(),other:$("pOther").value.trim()};
}
function enterGame(){
  $("setup").classList.add("hidden"); $("game").classList.remove("hidden");
  drawChibi($("hudAvatar").getContext("2d"),76); updateHUD(false);
}
$("startBtn").onclick=()=>{
  collectSetup();
  if(!state.apiKey){ toast("請先填入 API 金鑰"); $("apiKey").focus(); return; }
  if(!state.persona.name){ toast("請至少填寫助理姓名"); $("pName").focus(); return; }
  state.history=[]; state.transcript=[]; state.characters={}; state.lastUserHidden=false;
  state.stats={time:"—",location:"事務所",status:"日常",mood:"慵懶",affection:10,money:800};
  enterGame(); log().innerHTML="";
  sysRecord("── 台北・某條老街的二樓，燕行舟偵探事務所 ──");
  runTurn(`〔遊戲開場〕系統指令：以事務所的日常場景開場（先不要出現任何案件），描寫燕行舟與助理「${state.persona.name}」相處的日常，帶出兩人歡喜冤家的互動與燕行舟的性格，結尾留一個讓玩家能接話的自然開放情境。`,{silentUser:true});
};
$("resumeBtn").onclick=()=>{
  const s=store.get(LS.save); if(!s){ toast("找不到存檔"); return; }
  collectSetup();
  if(!state.apiKey){ toast("請先填入 API 金鑰再讀檔"); $("apiKey").focus(); return; }
  state.provider=$("provider").value; state.model=$("modelName").value.trim()||s.model;
  state.persona=s.persona||state.persona; state.stats=s.stats; state.history=s.history||[];
  state.transcript=s.transcript||[]; state.characters=s.characters||{}; state.lastUserHidden=!!s.lastUserHidden;
  enterGame(); rebuildFromTranscript(); updateHUD(false);
  toast("已載入存檔，接續進度");
};
$("backBtn").onclick=()=>{ saveGame(false); $("game").classList.add("hidden"); $("setup").classList.remove("hidden"); loadPrefs(); };

/* ---------- 送出 ---------- */
function send(){
  const v=$("actionInput").value.trim(); if(!v||state.busy) return;
  $("actionInput").value="";
  if(state.editIndex>=0){ runTurn(v,{replaceLast:true}); }
  else runTurn(v);
}
$("sendBtn").onclick=send;
$("actionInput").addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } });

/* 背景保活：頁面隱藏時提醒瀏覽器保持活動（fetch 本身在背景仍會完成） */
/* 回到分頁時不強制捲動，讓玩家自行閱讀 */
window.addEventListener("beforeunload",()=>{ if(state.history.length) saveGame(false); });

/* ---------- Q版圖示下載 ---------- */
$("iconBtn").onclick=()=>{
  const a=document.createElement("a");
  a.href=chibiDataURL(512); a.download="燕行舟-app-icon.png"; a.click();
  toast("已產生 512px App 圖示");
};

/* ---------- 初始化 ---------- */
const CHIBI_SM = chibiDataURL(68);
(function init(){
  loadPrefs();
  // favicon
  const link=document.createElement("link"); link.rel="icon"; link.href=chibiDataURL(64); document.head.appendChild(link);
})();
</script>
